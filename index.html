<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0F172A">
  <meta name="description" content="RikiAppStore - Developer Tools Hub. 12+ smart utilities: JSON formatter, crypto tools, regex tester, JWT debugger & more. No downloads, just tools.">
  <title>RikiAppStore — Dev Tools Hub</title>
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0,1" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f9;
      transition: background 0.2s ease;
      overflow-x: hidden;
    }

    body.dark {
      background: #121212;
      color: #f1f5f9;
    }

    /* Ripple effect */
    .ripple {
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }
    .ripple:after {
      content: "";
      display: block;
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      pointer-events: none;
      background-image: radial-gradient(circle, #fff 10%, transparent 10.01%);
      background-repeat: no-repeat;
      background-position: 50%;
      transform: scale(10, 10);
      opacity: 0;
      transition: transform .4s, opacity .5s;
    }
    .ripple:active:after {
      transform: scale(0, 0);
      opacity: 0.3;
      transition: 0s;
    }

    #app {
      max-width: 1280px;
      margin: 0 auto;
      padding-bottom: 80px;
    }

    /* AppBar */
    .app-bar {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 20px 20px 12px;
      flex-wrap: wrap;
      background: inherit;
    }
    .title-section h1 {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.3px;
    }
    .title-section p {
      font-size: 0.85rem;
      opacity: 0.7;
    }
    .app-actions {
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .icon-btn {
      background: transparent;
      border: none;
      font-size: 1.7rem;
      cursor: pointer;
      color: #1e293b;
      border-radius: 28px;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    body.dark .icon-btn { color: #cbd5e1; }
    .icon-btn:hover { background: rgba(0,0,0,0.05); }

    /* Search */
    .search-section {
      padding: 8px 20px;
    }
    .search-field {
      background: white;
      border-radius: 32px;
      padding: 12px 20px;
      display: flex;
      gap: 12px;
      align-items: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      border: 1px solid #e2e8f0;
    }
    body.dark .search-field {
      background: #1e293b;
      border-color: #334155;
    }
    .search-field input {
      flex: 1;
      border: none;
      background: transparent;
      font-size: 1rem;
      outline: none;
      font-weight: 500;
    }

    /* Grid */
    .tools-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 18px;
      padding: 20px;
    }
    .tool-card {
      background: white;
      border-radius: 20px;
      padding: 20px 12px;
      text-align: center;
      box-shadow: 0 6px 14px rgba(0,0,0,0.05);
      transition: transform 0.2s cubic-bezier(0.2,0.9,0.4,1.1), box-shadow 0.2s;
      cursor: pointer;
    }
    body.dark .tool-card {
      background: #1e293b;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }
    .tool-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 24px rgba(0,0,0,0.1);
    }
    .tool-icon { font-size: 2.5rem; margin-bottom: 12px; }
    .tool-name { font-weight: 600; font-size: 0.9rem; }

    /* Bottom Navigation */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(12px);
      display: flex;
      justify-content: space-around;
      padding: 8px 12px 20px;
      border-top: 1px solid #eef2ff;
      z-index: 100;
      max-width: 1280px;
      margin: 0 auto;
    }
    body.dark .bottom-nav {
      background: rgba(18,18,18,0.96);
      border-top-color: #2d3a4e;
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      font-size: 0.7rem;
      background: none;
      border: none;
      font-weight: 500;
      cursor: pointer;
      padding: 8px 16px;
      border-radius: 32px;
    }
    .nav-item span:first-child { font-size: 1.6rem; }
    .nav-item.active {
      color: #3b82f6;
      background: rgba(59,130,246,0.1);
    }
    body.dark .nav-item.active {
      background: rgba(59,130,246,0.2);
      color: #60a5fa;
    }

    /* Page transitions */
    .page-container {
      animation: slideIn 0.28s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }
    @keyframes slideIn {
      from { opacity: 0.6; transform: translateX(30px); }
      to { opacity: 1; transform: translateX(0); }
    }

    /* Cards & workspace */
    .material-card {
      background: white;
      border-radius: 20px;
      padding: 20px;
      margin: 16px 20px;
      box-shadow: 0 6px 12px rgba(0,0,0,0.05);
    }
    body.dark .material-card { background: #1e293b; }
    .welcome-card {
      background: linear-gradient(145deg, #ffffff, #f8fafc);
      border-left: 6px solid #3b82f6;
    }
    body.dark .welcome-card { background: #0f172a; }

    .tool-workspace { padding: 20px; }
    .flex-row { display: flex; gap: 16px; flex-wrap: wrap; align-items: center; margin: 12px 0; }
    textarea, input, select {
      width: 100%;
      padding: 14px;
      border-radius: 20px;
      border: 1px solid #e2e8f0;
      font-family: monospace;
      background: #f9f9ff;
    }
    body.dark textarea, body.dark input, body.dark select {
      background: #0f172a;
      border-color: #334155;
      color: white;
    }
    button.fab-style {
      background: #3b82f6;
      border: none;
      padding: 10px 22px;
      border-radius: 40px;
      color: white;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      box-shadow: 0 3px 6px rgba(0,0,0,0.1);
    }
    .code-block {
      background: #0a0c10;
      border-radius: 16px;
      padding: 16px;
      overflow-x: auto;
      font-family: 'Fira Code', monospace;
      font-size: 0.8rem;
      color: #e2e8f0;
    }
    .snackbar {
      visibility: hidden;
      min-width: 200px;
      background-color: #1f2937;
      color: #fff;
      text-align: center;
      border-radius: 40px;
      padding: 12px 24px;
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 200;
      font-weight: 500;
      transition: visibility 0.2s, opacity 0.2s;
      opacity: 0;
    }
    .snackbar.show { visibility: visible; opacity: 1; }
    .ad-card {
      background: #f1f5f9;
      border-radius: 20px;
      text-align: center;
      padding: 16px;
      font-size: 0.75rem;
      color: #475569;
      margin: 20px;
    }
    body.dark .ad-card { background: #1a202c; }
    @media (min-width: 768px) { .tools-grid { grid-template-columns: repeat(4, 1fr); } }
  </style>
</head>
<body>
<div id="app">
  <div class="app-bar">
    <div class="title-section"><h1>RikiAppStore</h1><p>Smart Tools, Not Downloads</p></div>
    <div class="app-actions">
      <button class="icon-btn ripple" id="searchGlobalBtn"><span class="material-symbols-outlined">search</span></button>
      <button class="icon-btn ripple" id="darkModeToggleBtn"><span class="material-symbols-outlined">dark_mode</span></button>
    </div>
  </div>
  <main id="mainContent"></main>
  <div class="bottom-nav" id="bottomNav"></div>
  <div id="snackbar" class="snackbar">Copied!</div>
</div>

<script>
  // ---------- FULL TOOLS LIBRARY (12 tools) ----------
  const toolsLibrary = [
    { id: "json", name: "JSON Formatter", icon: "📋", desc: "Format & validate JSON" },
    { id: "base64", name: "Base64 Tool", icon: "🔐", desc: "Encode/Decode Base64" },
    { id: "password", name: "Password Gen", icon: "🔑", desc: "Secure passwords" },
    { id: "color", name: "Color Picker", icon: "🎨", desc: "Pick & copy HEX" },
    { id: "url", name: "URL Encoder", icon: "🌐", desc: "Encode/Decode URLs" },
    { id: "jwt", name: "JWT Debugger", icon: "🪪", desc: "Decode JWT tokens" },
    { id: "regex", name: "Regex Tester", icon: "⚙️", desc: "Test regular expressions" },
    { id: "hash", name: "Hash Generator", icon: "🔒", desc: "MD5, SHA-1, SHA-256" },
    { id: "timestamp", name: "Timestamp Conv", icon: "⏱️", desc: "Unix ↔ Date" },
    { id: "qr", name: "QR Generator", icon: "📱", desc: "Generate QR codes" },
    { id: "diff", name: "Text Diff", icon: "🔍", desc: "Compare texts" },
    { id: "lorem", name: "Lorem Ipsum", icon: "📝", desc: "Generate placeholder text" }
  ];

  const guidesList = [
    { title: "Flutter Web Best Practices", desc: "Responsive design & Material 3" },
    { title: "JWT Security Guide", desc: "Verify & decode tokens safely" },
    { title: "Regex for Developers", desc: "Pattern matching mastery" },
    { title: "Password Entropy", desc: "How to generate strong passwords" }
  ];

  const snippetsData = [
    { lang: "JavaScript", title: "Deep Clone Object", code: "const clone = obj => JSON.parse(JSON.stringify(obj));" },
    { lang: "Dart", title: "Flutter HTTP GET", code: "final res = await http.get(Uri.parse(url));" },
    { lang: "Python", title: "JWT Decode", code: "import jwt; decoded = jwt.decode(token, options={'verify_signature': False})" },
    { lang: "CSS", title: "Neumorphism", code: "box-shadow: 20px 20px 60px #bebebe, -20px -20px 60px #ffffff;" }
  ];

  let activeTab = "home";
  let darkMode = localStorage.getItem("rikiDarkMode") === "true";
  let searchQuery = "";

  function showSnackbar(msg) {
    const snack = document.getElementById("snackbar");
    snack.textContent = msg || "Copied!";
    snack.classList.add("show");
    setTimeout(() => snack.classList.remove("show"), 2000);
  }

  function applyDarkMode() {
    if (darkMode) document.body.classList.add("dark");
    else document.body.classList.remove("dark");
    localStorage.setItem("rikiDarkMode", darkMode);
    const toggleIcon = document.querySelector("#darkModeToggleBtn span");
    if (toggleIcon) toggleIcon.innerText = darkMode ? "light_mode" : "dark_mode";
  }

  function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

  // Tool specific UI rendering
  function renderToolUI(toolId, container) {
    const tool = toolsLibrary.find(t => t.id === toolId);
    if (!tool) return;
    if (toolId === "json") {
      container.innerHTML = `<textarea id="jsonInput" rows="5" placeholder='{"name":"RikiAppStore","version":"2.0"}'></textarea><div class="flex-row"><button class="fab-style" id="formatJsonBtn">Format</button><button class="fab-style" id="copyJsonBtn">Copy</button></div><pre id="jsonOutput" class="code-block"></pre>`;
      document.getElementById("formatJsonBtn")?.addEventListener("click",()=>{ try{ let val=JSON.parse(document.getElementById("jsonInput").value); document.getElementById("jsonOutput").innerText=JSON.stringify(val,null,2); showSnackbar("Formatted"); } catch(e){ document.getElementById("jsonOutput").innerText="Invalid JSON"; } });
      document.getElementById("copyJsonBtn")?.addEventListener("click",()=>{ let txt=document.getElementById("jsonOutput").innerText; if(txt) navigator.clipboard.writeText(txt); showSnackbar("Copied!"); });
    }
    else if (toolId === "base64") {
      container.innerHTML = `<textarea id="b64Input" rows="3" placeholder="Text to encode/decode"></textarea><div class="flex-row"><button class="fab-style" id="encode64">Encode</button><button class="fab-style" id="decode64">Decode</button></div><textarea id="b64Result" rows="3" readonly placeholder="Result"></textarea>`;
      document.getElementById("encode64")?.addEventListener("click",()=>{ let val=document.getElementById("b64Input").value; document.getElementById("b64Result").value = btoa(unescape(encodeURIComponent(val))); showSnackbar("Encoded"); });
      document.getElementById("decode64")?.addEventListener("click",()=>{ try{ let val=atob(document.getElementById("b64Input").value); document.getElementById("b64Result").value=decodeURIComponent(escape(val)); showSnackbar("Decoded"); } catch(e){ document.getElementById("b64Result").value="Invalid Base64"; } });
    }
    else if (toolId === "password") {
      container.innerHTML = `<div>Length: <input type="number" id="passLen" value="12" min="6" max="32"></div><div><label><input type="checkbox" id="useSymbols" checked> Symbols</label></div><button class="fab-style" id="genPassBtn">Generate</button><input id="genPasswordField" readonly style="margin-top:12px;"><button id="copyPassBtn" class="fab-style" style="margin-top:8px;">Copy</button>`;
      document.getElementById("genPassBtn")?.addEventListener("click",()=>{ const len=parseInt(document.getElementById("passLen").value); const symbols="!@#$%^&*()_+"; let chars="ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789"; if(document.getElementById("useSymbols").checked) chars+=symbols; let pwd=""; for(let i=0;i<len;i++) pwd+=chars.charAt(Math.floor(Math.random()*chars.length)); document.getElementById("genPasswordField").value=pwd; showSnackbar("Generated"); });
      document.getElementById("copyPassBtn")?.addEventListener("click",()=>{ let p=document.getElementById("genPasswordField").value; if(p) navigator.clipboard.writeText(p); showSnackbar("Copied!"); });
    }
    else if (toolId === "color") {
      container.innerHTML = `<input type="color" id="colorPicker" value="#3b82f6"><div id="colorPreview" style="background:#3b82f6; border-radius:24px; margin-top:16px; padding:24px; text-align:center;">#3b82f6</div><button id="copyColorBtn" class="fab-style">Copy HEX</button>`;
      const picker = document.getElementById("colorPicker");
      const preview = document.getElementById("colorPreview");
      const update = () => { preview.style.backgroundColor = picker.value; preview.innerText = picker.value; };
      picker.addEventListener("input", update);
      update();
      document.getElementById("copyColorBtn")?.addEventListener("click",()=>{ navigator.clipboard.writeText(picker.value); showSnackbar("Color copied"); });
    }
    else if (toolId === "url") {
      container.innerHTML = `<textarea id="urlInput" rows="2" placeholder="https://example.com?name=hello world"></textarea><div class="flex-row"><button class="fab-style" id="encodeUrl">Encode</button><button class="fab-style" id="decodeUrl">Decode</button></div><textarea id="urlResult" rows="2" readonly></textarea>`;
      document.getElementById("encodeUrl")?.addEventListener("click",()=>{ let val=document.getElementById("urlInput").value; document.getElementById("urlResult").value=encodeURIComponent(val); showSnackbar("Encoded"); });
      document.getElementById("decodeUrl")?.addEventListener("click",()=>{ let val=document.getElementById("urlInput").value; document.getElementById("urlResult").value=decodeURIComponent(val); showSnackbar("Decoded"); });
    }
    else if (toolId === "jwt") {
      container.innerHTML = `<textarea id="jwtInput" rows="3" placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."></textarea><button class="fab-style" id="decodeJwtBtn">Decode JWT</button><pre id="jwtOutput" class="code-block"></pre>`;
      document.getElementById("decodeJwtBtn")?.addEventListener("click",()=>{ try{ let token = document.getElementById("jwtInput").value; let parts = token.split('.'); if(parts.length!==3) throw new Error(); let header = JSON.parse(atob(parts[0])); let payload = JSON.parse(atob(parts[1])); document.getElementById("jwtOutput").innerText = JSON.stringify({header, payload}, null, 2); showSnackbar("Decoded"); } catch(e){ document.getElementById("jwtOutput").innerText = "Invalid JWT format"; } });
    }
    else if (toolId === "regex") {
      container.innerHTML = `<input id="regexPattern" placeholder="Pattern (e.g., \\d+)" style="margin-bottom:8px;"><input id="regexTestStr" placeholder="Test string"><button class="fab-style" id="testRegexBtn">Test</button><div id="regexResult" class="code-block" style="margin-top:12px;"></div>`;
      document.getElementById("testRegexBtn")?.addEventListener("click",()=>{ try{ let pattern = document.getElementById("regexPattern").value; let flags = 'g'; let re = new RegExp(pattern, flags); let matches = document.getElementById("regexTestStr").value.match(re); document.getElementById("regexResult").innerHTML = matches ? `Matches: ${matches.join(', ')}` : "No match"; } catch(e){ document.getElementById("regexResult").innerHTML = "Invalid regex"; } });
    }
    else if (toolId === "hash") {
      async function hashString(alg, str) { const enc = new TextEncoder(); const hash = await crypto.subtle.digest(alg, enc.encode(str)); return Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,'0')).join(''); }
      container.innerHTML = `<textarea id="hashInput" placeholder="Text to hash"></textarea><select id="hashAlgo"><option value="SHA-256">SHA-256</option><option value="SHA-1">SHA-1</option><option value="MD5">MD5 (browser limited)</option></select><button class="fab-style" id="computeHashBtn">Generate Hash</button><textarea id="hashOutput" readonly></textarea>`;
      document.getElementById("computeHashBtn")?.addEventListener("click", async () => { let txt = document.getElementById("hashInput").value; let algo = document.getElementById("hashAlgo").value; if(algo === "MD5") { document.getElementById("hashOutput").value = "MD5 not supported natively, use SHA"; return; } let hash = await hashString(algo, txt); document.getElementById("hashOutput").value = hash; showSnackbar("Hashed"); });
    }
    else if (toolId === "timestamp") {
      container.innerHTML = `<div class="flex-row"><input id="unixInput" placeholder="Unix timestamp (seconds)"><button id="toDateBtn">→ Date</button></div><div class="flex-row"><input id="dateInput" type="datetime-local"><button id="toUnixBtn">→ Timestamp</button></div><div id="tsResult" class="code-block"></div>`;
      document.getElementById("toDateBtn")?.addEventListener("click",()=>{ let ts = parseInt(document.getElementById("unixInput").value); if(isNaN(ts)) return; let d = new Date(ts*1000); document.getElementById("tsResult").innerText = d.toString(); });
      document.getElementById("toUnixBtn")?.addEventListener("click",()=>{ let dval = document.getElementById("dateInput").value; let d = new Date(dval); if(!isNaN(d)) document.getElementById("tsResult").innerText = Math.floor(d.getTime()/1000); });
    }
    else if (toolId === "qr") {
      container.innerHTML = `<input id="qrText" placeholder="Enter text or URL"><button class="fab-style" id="genQrBtn">Generate QR</button><div id="qrCanvas" style="text-align:center; margin-top:16px;"></div>`;
      document.getElementById("genQrBtn")?.addEventListener("click",()=>{ let text = document.getElementById("qrText").value; if(!text) return; let qrDiv = document.getElementById("qrCanvas"); qrDiv.innerHTML = `<canvas id="qrCanvasElem" width="200" height="200"></canvas>`; let canvas = document.getElementById("qrCanvasElem"); if(typeof QRCode !== 'undefined') new QRCode(canvas, text); else qrDiv.innerHTML = `<div class="material-card">⚠️ QR library would load here. Use external QR library in production.</div>`; });
    }
    else if (toolId === "diff") {
      container.innerHTML = `<textarea id="diffText1" rows="3" placeholder="Original text"></textarea><textarea id="diffText2" rows="3" placeholder="Modified text"></textarea><button class="fab-style" id="compareTextBtn">Compare</button><pre id="diffOutput" class="code-block"></pre>`;
      document.getElementById("compareTextBtn")?.addEventListener("click",()=>{ let a=document.getElementById("diffText1").value; let b=document.getElementById("diffText2").value; if(a===b) document.getElementById("diffOutput").innerText = "Texts are identical"; else document.getElementById("diffOutput").innerText = "Different content (basic diff). First char diff at index: "+[...Array(Math.min(a.length,b.length))].findIndex(i=>a[i]!==b[i]); });
    }
    else if (toolId === "lorem") {
      container.innerHTML = `<div><select id="loremCount"><option value="1">1 paragraph</option><option value="2">2 paragraphs</option><option value="3">3 paragraphs</option></select><button class="fab-style" id="genLoremBtn">Generate</button></div><textarea id="loremOutput" rows="6" readonly></textarea>`;
      const loremText = "Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris.";
      document.getElementById("genLoremBtn")?.addEventListener("click",()=>{ let count = parseInt(document.getElementById("loremCount").value); let result = Array(count).fill(loremText).join("\n\n"); document.getElementById("loremOutput").value = result; showSnackbar("Generated"); });
    }
  }

  function openToolScreen(toolId) {
    const main = document.getElementById("mainContent");
    main.innerHTML = `<div class="page-container"><div class="material-card" style="margin:20px;"><div style="display:flex; gap:12px; align-items:center;"><span class="material-symbols-outlined" style="cursor:pointer;" id="backToPrev">arrow_back</span><h2>${toolsLibrary.find(t=>t.id===toolId)?.name}</h2></div><div id="toolWidgetArea"></div></div></div>`;
    document.getElementById("backToPrev").addEventListener("click", () => { renderPage(); });
    renderToolUI(toolId, document.getElementById("toolWidgetArea"));
  }

  function renderToolsGrid(containerId, filterQuery = "") {
    const filtered = toolsLibrary.filter(t => t.name.toLowerCase().includes(filterQuery.toLowerCase()));
    const grid = document.getElementById(containerId);
    if(grid) {
      grid.innerHTML = filtered.map(tool => `<div class="tool-card ripple" data-tool-id="${tool.id}"><div class="tool-icon">${tool.icon}</div><div class="tool-name">${tool.name}</div><div style="font-size:0.7rem; opacity:0.7;">${tool.desc}</div></div>`).join('');
      document.querySelectorAll('[data-tool-id]').forEach(card => { card.addEventListener('click', (e) => { openToolScreen(card.getAttribute('data-tool-id')); }); });
    }
  }

  function renderPage() {
    const main = document.getElementById("mainContent");
    if(activeTab === "home") {
      main.innerHTML = `<div class="page-container"><div class="material-card welcome-card ripple"><h3>👋 Welcome, Developer</h3><p>12+ professional dev tools: JWT, Regex, Hash, QR, Diff & more. Zero downloads, instant results.</p></div><div class="search-section"><div class="search-field"><span class="material-symbols-outlined">search</span><input type="text" id="homeSearchInput" placeholder="Search tools..."></div></div><div class="tools-grid" id="toolsGridHome"></div><div class="ad-card">🔥 RikiAppStore Pro — coming soon. Support dev tools!</div></div>`;
      renderToolsGrid("toolsGridHome", "");
      const inp = document.getElementById("homeSearchInput");
      if(inp) inp.addEventListener("input", (e) => { renderToolsGrid("toolsGridHome", e.target.value); });
    }
    else if(activeTab === "tools") {
      main.innerHTML = `<div class="page-container"><div class="tools-grid" id="allToolsGrid" style="padding:20px;"></div><div class="ad-card">🛠️ All utilities — developer first</div></div>`;
      renderToolsGrid("allToolsGrid", "");
    }
    else if(activeTab === "guides") {
      main.innerHTML = `<div class="page-container"><div id="guidesList"></div><div class="ad-card">📚 Learning resources</div></div>`;
      const guidesDiv = document.getElementById("guidesList");
      if(guidesDiv) guidesDiv.innerHTML = guidesList.map(g => `<div class="material-card ripple" style="margin-bottom:12px;"><h4>📖 ${g.title}</h4><p>${g.desc}</p></div>`).join('');
    }
    else if(activeTab === "snippets") {
      main.innerHTML = `<div class="page-container"><div id="snippetsContainer"></div><div class="ad-card">⚡ Productivity snippets</div></div>`;
      const snippetsDiv = document.getElementById("snippetsContainer");
      if(snippetsDiv) {
        snippetsDiv.innerHTML = snippetsData.map(s => `<div class="material-card"><div style="display:flex; justify-content:space-between;"><strong>${s.title}</strong><span style="background:#334155; border-radius:20px; padding:2px 10px;">${s.lang}</span><button class="copySnippetBtn" data-code="${escapeHtml(s.code)}" style="background:#3b82f6; border:none; border-radius:30px; padding:4px 12px; color:white;">Copy</button></div><pre class="code-block"><code>${escapeHtml(s.code)}</code></pre></div>`).join('');
        document.querySelectorAll('.copySnippetBtn').forEach(btn => { btn.addEventListener('click', () => { navigator.clipboard.writeText(btn.getAttribute('data-code')); showSnackbar("Snippet copied!"); }); });
      }
    }
    else if(activeTab === "profile") {
      main.innerHTML = `<div class="page-container"><div class="material-card"><h3>👤 Profile</h3><div style="display:flex; justify-content:space-between; margin:20px 0;"><span>🌙 Dark Mode</span><button id="profileDarkToggle" class="fab-style" style="background:#475569;">Toggle</button></div><hr><p><strong>RikiAppStore</strong><br/>Version 3.0.0 (Flutter PWA)</p><p>📧 riki@devtools.example<br/>⚡ 12+ integrated tools</p><button id="installPwaBtn" class="fab-style ripple">📲 Install as App</button></div><div class="ad-card">✨ Open source — forever free tools</div></div>`;
      document.getElementById("profileDarkToggle")?.addEventListener("click", () => { darkMode = !darkMode; applyDarkMode(); renderPage(); });
      document.getElementById("installPwaBtn")?.addEventListener("click", () => { if(window.deferredPrompt) window.deferredPrompt.prompt(); else showSnackbar("Install from browser menu"); });
    }
    buildBottomNav();
  }

  function buildBottomNav() {
    const navContainer = document.getElementById("bottomNav");
    const tabs = ["home", "tools", "guides", "snippets", "profile"];
    const icons = ["home", "build", "menu_book", "code", "person"];
    const labels = ["Home", "Tools", "Guides", "Snippets", "Me"];
    navContainer.innerHTML = tabs.map((tab, idx) => `<button class="nav-item ripple ${activeTab===tab ? 'active' : ''}" data-tab="${tab}"><span class="material-symbols-outlined">${icons[idx]}</span><span>${labels[idx]}</span></button>`).join('');
    document.querySelectorAll(".nav-item").forEach(btn => { btn.addEventListener("click", () => { activeTab = btn.getAttribute("data-tab"); renderPage(); }); });
  }

  // Service Worker Registration
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => { navigator.serviceWorker.register('/service-worker.js').catch(err => console.log("SW err:", err)); });
  }
  let deferredPrompt;
  window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); deferredPrompt = e; window.deferredPrompt = deferredPrompt; });

  document.getElementById("darkModeToggleBtn")?.addEventListener("click", () => { darkMode = !darkMode; applyDarkMode(); renderPage(); });
  document.getElementById("searchGlobalBtn")?.addEventListener("click", () => { activeTab = "home"; renderPage(); setTimeout(()=>document.getElementById("homeSearchInput")?.focus(), 100); });
  applyDarkMode();
  renderPage();
</script>
</body>
</html>
